<svg width="1800" height="1320" viewBox="0 0 1800 1320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg{fill:#f6f8fc}
    .title{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:42px;font-weight:900;fill:#111827}
    .subtitle{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:18px;font-weight:600;fill:#64748b}
    .lane-title{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:28px;font-weight:900;fill:#111827}
    .lane-sub{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:15px;font-weight:600;fill:#64748b}
    .node-title{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:18px;font-weight:850;fill:#111827}
    .node-sub{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:13px;font-weight:600;fill:#64748b}
    .small{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:12px;font-weight:700;fill:#64748b}
    .tag{font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;font-size:12px;font-weight:850;fill:#5368f5}
    .card{fill:#ffffff;stroke:#dbe3f0;stroke-width:1.4}
    .root-user{fill:#fff5f5;stroke:#ffb4ae;stroke-width:2}
    .root-admin{fill:#eef2ff;stroke:#a8b4ff;stroke-width:2}
    .section-user{fill:#ffffff;stroke:#ffd3cf;stroke-width:1.4}
    .section-admin{fill:#ffffff;stroke:#cbd5ff;stroke-width:1.4}
    .subnode{fill:#f8fafc;stroke:#e5e9f2;stroke-width:1.2}
    .modal{fill:#fff7ed;stroke:#fed7aa;stroke-width:1.4}
    .line{stroke:#94a3b8;stroke-width:1.5}
    .line-user{stroke:#ef7d73;stroke-width:1.6}
    .line-admin{stroke:#6f7df5;stroke-width:1.6}
    .dash{stroke-dasharray:5 5}
  </style>

  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-user" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#ef7d73"/>
    </marker>
    <marker id="arrow-admin" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#6f7df5"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="bg" width="1800" height="1320"/>

  <text class="title" x="70" y="76">노하우집 현재 화면 구조도</text>
  <text class="subtitle" x="70" y="110">사용자 화면(index.html)과 크리에이터 관리자 화면(creator-admin.html)의 현재 구현 기준 SVG 구조도</text>
  <text class="small" x="70" y="139">Figma 가져오기용 · 도형/텍스트 기반 · 파일: knowhowzip-site/docs/knowhowzip-screen-structure.svg</text>

  <rect x="50" y="175" width="820" height="1085" rx="24" fill="#fffafa" stroke="#ffd8d5"/>
  <rect x="930" y="175" width="820" height="1085" rx="24" fill="#f8f9ff" stroke="#dbe2ff"/>
  <text class="lane-title" x="90" y="225">사용자 화면</text>
  <text class="lane-sub" x="90" y="251">공개 랜딩, 크리에이터 탐색, 결제, 내 학습</text>
