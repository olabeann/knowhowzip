<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>노하우집 운영 관리자</title>
  <style>
    :root{--brand:#5368f5;--soft:#eef1ff;--ink:#111827;--muted:#718096;--line:#e5e9f2;--bg:#f6f8fc;--green:#08af69;--orange:#f59e0b;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Pretendard,"Noto Sans KR",Arial,sans-serif;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}.shell{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;padding:28px 18px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column}.brand{font-size:24px;font-weight:900;margin:0 10px 26px}.brand small{margin-left:8px;color:var(--brand);font-size:11px;background:var(--soft);padding:6px 9px;border-radius:99px}.profile{display:flex;gap:12px;align-items:center;padding:14px;border:1px solid var(--line);border-radius:16px;background:#fafbff;margin-bottom:24px}.avatar{width:42px;height:42px;display:grid;place-items:center;background:var(--brand);color:#fff;border-radius:13px;font-weight:900}.profile small{display:block;color:var(--muted);margin-top:4px}.nav{display:grid;gap:6px}.nav button{height:50px;border:0;border-radius:13px;background:transparent;text-align:left;padding:0 15px;font-weight:800;color:#526078;cursor:pointer}.nav button.active{background:var(--soft);color:var(--brand)}.links{margin-top:auto;border-top:1px solid var(--line);padding-top:15px}.links a{display:block;color:#526078;text-decoration:none;font-weight:750;padding:10px 4px}.work{min-width:0}.top{height:70px;padding:0 32px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}.top strong{color:#8a96aa}.main{padding:34px;max-width:1350px}.head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:24px}.head em{font-style:normal;color:var(--brand);font-size:12px;font-weight:900}.head h1{font-size:34px;margin:8px 0}.head p{margin:0;color:var(--muted)}.btn{height:43px;padding:0 16px;border:1px solid var(--line);border-radius:12px;background:#fff;font-weight:850;cursor:pointer}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px}.metric,.panel,.card{background:#fff;border:1px solid var(--line);border-radius:20px}.metric{padding:21px}.metric span{color:#64748b;font-size:14px;font-weight:800}.metric b{display:block;font-size:29px;margin:12px 0 5px}.metric small{color:var(--green);font-weight:800}.grid{display:grid;grid-template-columns:1.45fr .75fr;gap:18px}.panel{padding:22px;margin-bottom:18px}.panel-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:17px}.panel h2{font-size:20px;margin:0}.panel-head p{color:var(--muted);font-size:13px;margin:5px 0 0}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th{padding:12px;background:#f8fafc;color:#8a96aa;text-align:left;font-size:12px}td{padding:15px 12px;border-bottom:1px solid #edf0f6;font-size:14px}.chip{display:inline-block;padding:6px 9px;border-radius:99px;background:#e8f8f0;color:var(--green);font-size:12px;font-weight:900}.chip.wait{background:#fff3dc;color:#c87600}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.card{padding:20px}.card small{color:var(--brand);font-weight:900}.card h3{margin:12px 0 7px}.card p{color:var(--muted);line-height:1.6;font-size:14px}.search{display:flex;gap:10px;margin-bottom:16px}.search input,.search select{height:43px;border:1px solid var(--line);border-radius:11px;background:#fff;padding:0 12px}.search input{flex:1}.tasks{display:grid;gap:10px}.task{padding:14px;border:1px solid var(--line);border-radius:14px}.task b{display:block;margin-bottom:5px}.task small{color:var(--muted);line-height:1.5}.notice{padding:18px;background:#f8fafc;border:1px solid var(--line);border-radius:15px;color:#526078;line-height:1.7}.mobile-menu{display:none}.empty{padding:55px;text-align:center;color:var(--muted)}
    .detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.detail-item{padding:16px;background:#f8fafc;border-radius:14px}.detail-item small{display:block;color:var(--muted);margin-bottom:7px}.detail-item b{font-size:15px}.action{border:0;background:transparent;color:var(--brand);font-weight:850;cursor:pointer}.btn:disabled{opacity:.5;cursor:not-allowed}
    @media(max-width:1000px){.shell{grid-template-columns:1fr}.side{position:static;height:auto}.nav{grid-template-columns:repeat(4,1fr)}.links{display:none}.metrics{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.detail-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:650px){.side{padding:20px 14px}.nav{grid-template-columns:repeat(2,1fr)}.main{padding:22px 15px}.top{padding:0 18px}.head{display:block}.head .btn{margin-top:16px;width:100%}.metrics,.cards,.detail-grid{grid-template-columns:1fr}.head h1{font-size:29px}}
  </style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">노하우집 <small>ADMIN</small></div>
    <div class="profile"><div class="avatar">운</div><div><b>노하우집 운영팀</b><small>플랫폼 관리자</small></div></div>
    <nav class="nav">
      <button data-page="dashboard">운영 대시보드</button><button data-page="creators">크리에이터 관리</button>
      <button data-page="classes">강의 관리</button><button data-page="products">상품 현황</button>
      <button data-page="orders">주문·수강권한</button><button data-page="alimtalk">알림톡 승인</button>
      <button data-page="settlement">정산 관리</button><button data-page="settings">운영 설정</button>
    </nav>
    <div class="links"><a href="./creator-admin.html">크리에이터 관리자 보기 →</a><a href="./index.html">사용자 화면 보기 →</a></div>
  </aside>
  <section class="work"><header class="top"><strong>노하우집 운영 관리자</strong><button class="btn">관리자 계정</button></header><main id="main" class="main"></main></section>
</div>
<script>
const rows={
 creators:[["애매모홈","@mmoh","부동산·경매","운영 중","노출 중"]],
 classes:[["경매 낙찰 기초반","애매모홈","모집 중","공개"],["권리분석 실전반","애매모홈","모집 중","공개"],["현장 임장 마스터","애매모홈","모집 예정","공개"]],
 products:[["애매모홈","경매 낙찰 기초반 이용권","경매 낙찰 기초반","290,000원","판매 중"],["애매모홈","권리분석 실전반 이용권","경매 낙찰 기초반, 권리분석 실전반","590,000원","판매 중"],["애매모홈","현장 임장 마스터 이용권","현장 임장 마스터","450,000원","판매 준비"]],
 orders:[["김지훈","경매 낙찰 기초반 이용권","290,000원","결제 완료","권한 부여"],["이서연","권리분석 실전반 이용권","590,000원","결제 완료","권한 부여"],["박민수","현장 임장 마스터 이용권","450,000원","환불 요청","권한 확인"]],
 settlement:[["애매모홈","18,420,000원","273,600원","15,936,000원","정산 예정"]],
 contracts:[["애매모홈","클래스 운영 계약","2026.01.10","2026.12.31","전자서명 완료"]]
};
const titles={dashboard:["OPERATION","운영 대시보드","플랫폼 운영 상태와 확인이 필요한 항목을 한눈에 봅니다."],creators:["CREATORS","크리에이터 관리","입점 크리에이터의 승인과 운영 상태를 관리합니다."],classes:["CLASSES","강의 관리","크리에이터가 등록한 강의와 공개 상태를 확인합니다."],products:["PRODUCTS","크리에이터 상품 현황","크리에이터가 등록한 상품 구성과 판매 상태를 조회하고 필요한 항목만 확인합니다."],orders:["ORDERS","주문·수강권한","결제 상태와 실제 수강 권한이 일치하는지 확인합니다."],alimtalk:["ALIMTALK","알림톡 승인","크리에이터가 요청한 안내 문구를 검토하고 승인합니다."],settlement:["SETTLEMENT","정산 관리","크리에이터별 매출과 환불 반영 금액을 확인합니다."],settings:["SETTINGS","운영 설정","플랫폼 공통 정책과 운영 기준을 관리합니다."]};
function head(page,button=""){const t=titles[page];return `<div class="head"><div><em>${t[0]}</em><h1>${t[1]}</h1><p>${t[2]}</p></div>${button}</div>`}
function chip(v){return `<span class="chip ${/대기|예정|확인|검토|요청/.test(v)?'wait':''}">${v}</span>`}
function table(headers,data){return `<div class="table-wrap"><table><thead><tr>${headers.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${data.map(r=>`<tr>${r.map((x,i)=>`<td>${i===r.length-1?chip(x):x}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function dashboard(){return head('dashboard')+`<div class="metrics"><div class="metric"><span>운영 크리에이터</span><b>1명</b><small>애매모홈 운영 중</small></div><div class="metric"><span>판매 상품</span><b>3개</b><small>판매 준비 1개</small></div><div class="metric"><span>이번 달 결제</span><b>18.4M</b><small>권한 부여 정상</small></div><div class="metric"><span>확인할 요청</span><b>2건</b><small>알림톡·환불 포함</small></div></div><div class="grid"><div class="panel"><div class="panel-head"><div><h2>최근 주문과 권한</h2><p>결제 이후 수강 권한이 정상 부여됐는지 확인합니다.</p></div></div>${table(['수강생','상품','금액','결제 상태','권한'],rows.orders)}</div><div class="panel"><div class="panel-head"><div><h2>오늘 확인할 일</h2><p>운영팀 처리 항목</p></div></div><div class="tasks"><div class="task"><b>알림톡 승인 1건</b><small>수정된 문구는 승인 후 발송에 반영됩니다.</small></div><div class="task"><b>환불 요청 1건</b><small>결제 상태와 수강 권한을 함께 확인하세요.</small></div><div class="task"><b>상품 공개 상태 확인</b><small>판매 준비 상품의 공개 전 정보를 확인하세요.</small></div></div></div></div>`}
function listPage(page,headers,data,button=""){return head(page,button)+`<div class="search"><input placeholder="이름이나 키워드 검색"><select><option>전체 상태</option><option>운영 중</option><option>확인 필요</option></select></div><div class="panel">${table(headers,data)}</div>`}
function creators(){return head('creators','<button class="btn primary">+ 입점 등록</button>')+`<div class="search"><input placeholder="크리에이터 이름이나 계정 검색"><select><option>전체 상태</option><option>운영 중</option><option>승인 대기</option></select><select><option>전체 노출 상태</option><option>노출 중</option><option>숨김</option></select></div><div class="panel"><div class="table-wrap"><table><thead><tr><th>크리에이터</th><th>계정</th><th>분야</th><th>운영 상태</th><th>사용자 노출</th><th></th></tr></thead><tbody>${rows.creators.map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td><td>${chip(r[3])}</td><td>${chip(r[4])}</td><td><button class="action" onclick="creatorDetail('${r[0]}')">상세 보기 →</button></td></tr>`).join('')}</tbody></table></div></div>`}
function toggleCreatorVisibility(name){const creator=rows.creators.find(r=>r[0]===name);if(creator[3]==='승인 대기')return;creator[4]=creator[4]==='노출 중'?'숨김':'노출 중';creatorDetail(name)}
function creatorDetail(name){const creator=rows.creators.find(r=>r[0]===name);const visible=creator[4]==='노출 중';const contract=['클래스 운영 계약','전자서명 완료','2026.01.10','2026.12.31'];document.querySelector('#main').innerHTML=`<div class="head"><div><em>CREATOR DETAIL</em><h1>${name}</h1><p>운영에 필요한 채널, 담당자, 계약 및 활동 정보를 확인합니다.</p></div><button class="btn" onclick="show('creators')">← 목록으로</button></div><div class="panel"><div class="panel-head"><div><h2>사용자 화면 노출</h2><p>숨김 처리하면 크리에이터 목록과 공개 페이지에서 사용자에게 노출되지 않습니다.</p></div><button class="btn ${visible?'':'primary'}" onclick="toggleCreatorVisibility('${name}')">${visible?'노출 중지':'노출하기'}</button></div><div class="notice">현재 상태: <b>${creator[4]}</b></div></div><div class="grid"><div><div class="panel"><div class="panel-head"><div><h2>기본 정보</h2><p>공개 페이지와 운영 연락에 사용하는 정보입니다.</p></div><button class="btn">수정 요청</button></div><div class="detail-grid"><div class="detail-item"><small>채널명</small><b>${name}</b></div><div class="detail-item"><small>분야</small><b>부동산·경매</b></div><div class="detail-item"><small>운영 상태</small><b>운영 중</b></div><div class="detail-item"><small>담당자</small><b>이원일</b></div><div class="detail-item"><small>연락처</small><b>010-1234-5678</b></div><div class="detail-item"><small>이메일</small><b>creator@example.com</b></div></div></div><div class="panel"><div class="panel-head"><div><h2>계약 정보</h2><p>현재 적용되는 계약과 유효 기간입니다.</p></div><button class="btn">계약서 보기</button></div><div class="detail-grid"><div class="detail-item"><small>계약 유형</small><b>${contract[0]}</b></div><div class="detail-item"><small>체결 상태</small><b>${contract[1]}</b></div><div class="detail-item"><small>계약 시작일</small><b>${contract[2]}</b></div><div class="detail-item"><small>계약 종료일</small><b>${contract[3]}</b></div><div class="detail-item"><small>갱신 안내</small><b>종료 30일 전</b></div><div class="detail-item"><small>담당 운영자</small><b>이원일</b></div></div></div></div><div><div class="panel"><div class="panel-head"><div><h2>운영 현황</h2><p>최근 활동 요약</p></div></div><div class="tasks"><div class="task"><b>공개 강의 3개</b><small>모집 중인 강의와 공개 상태를 확인합니다.</small></div><div class="task"><b>판매 상품 3개</b><small>상품 등록과 수정은 크리에이터가 진행합니다.</small></div><div class="task"><b>알림톡 승인 대기 1건</b><small>수정 문구는 운영팀 승인 후 반영됩니다.</small></div></div></div><div class="panel"><div class="panel-head"><div><h2>최근 운영 메모</h2></div></div><div class="notice">최근 상담이나 계약 관련 확인 사항을 운영팀 내부 메모로 남기는 영역입니다.</div></div></div></div>`;history.replaceState(null,'','#creator-detail')}
function products(){return head('products')+`<div class="search"><input placeholder="크리에이터 또는 상품명 검색"><select><option>전체 크리에이터</option><option>애매모홈</option></select><select><option>전체 상태</option><option>판매 중</option><option>판매 준비</option></select></div><div class="cards"><div class="card"><small>운영 기준</small><h3>등록 주체는 크리에이터</h3><p>상품 생성과 수정은 각 크리에이터 관리자에서 진행합니다.</p></div><div class="card"><small>운영팀 역할</small><h3>현황 조회와 정책 확인</h3><p>판매 상태, 포함 클래스, 선수강 조건에 이상이 있는지만 확인합니다.</p></div><div class="card"><small>필요 시</small><h3>크리에이터에게 수정 요청</h3><p>운영 관리자가 상품을 직접 수정하지 않고 요청을 전달합니다.</p></div></div><div class="panel" style="margin-top:18px">${table(['크리에이터','상품','포함 클래스','가격','상태'],rows.products)}</div>`}
function alimtalk(){return head('alimtalk')+`<div class="grid"><div class="panel"><div class="panel-head"><div><h2>승인 대기 문구</h2><p>크리에이터가 새로 작성하거나 수정한 알림톡입니다.</p></div></div><div class="tasks"><div class="task"><b>결제 완료 안내</b><small>애매모홈 · 결제 완료 즉시 · 승인 대기</small></div><div class="task"><b>일정 안내</b><small>애매모홈 · 일정 당일 오전 10시 · 수정 요청</small></div></div></div><div class="panel"><div class="panel-head"><div><h2>승인 정책</h2><p>즉시 반영되지 않는 운영 구조</p></div></div><div class="notice">크리에이터가 문구를 수정하면 운영 관리자에게 승인 요청이 전달됩니다. 운영팀 승인 이후 알리고 API 발송 템플릿에 반영됩니다.</div><button class="btn primary" style="margin-top:14px;width:100%">선택 문구 검토</button></div></div>`}
function settings(){return head('settings')+`<div class="cards"><div class="card"><small>FAQ</small><h3>클래스별 FAQ</h3><p>사용자 화면에는 통합 검색창 하나를 두고, 검색 결과는 수강 중인 전체 클래스 FAQ를 기반으로 제공합니다.</p></div><div class="card"><small>LIVE</small><h3>라이브 일정 제한</h3><p>라이브 일정은 해당 클래스의 수강 종료일을 넘어 등록할 수 없습니다.</p></div><div class="card"><small>ACCESS</small><h3>선수강 조건</h3><p>필수 선수강 강의를 이수하지 않은 사용자는 다음 상품을 결제할 수 없습니다.</p></div></div>`}
const renderers={dashboard,creators,classes:()=>listPage('classes',['강의','크리에이터','모집 상태','공개 상태'],rows.classes),products,orders:()=>listPage('orders',['수강생','상품','금액','결제 상태','권한'],rows.orders),alimtalk,settlement:()=>listPage('settlement',['크리에이터','매출','환불','정산 예정액','상태'],rows.settlement),settings};
function show(page){document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===page));document.querySelector('#main').innerHTML=renderers[page]();history.replaceState(null,'','#'+page)}
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>show(b.dataset.page)));const initial=location.hash.slice(1);if(initial==='creator-detail'){show('creators');creatorDetail('애매모홈')}else{show(renderers[initial]?initial:'dashboard')}
