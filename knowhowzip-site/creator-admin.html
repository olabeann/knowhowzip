<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노하우집 · 크리에이터 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./css/admin.css">
  <link rel="stylesheet" href="./css/refund-policy.css">
  <link rel="stylesheet" href="./css/policy-guide.css?v=20260724-2">
</head>
<body>
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <a class="admin-brand" href="./index.html" aria-label="노하우집 공개 페이지로 이동">
        <img src="./assets/images/knowhowzip-logo.png" alt="노하우집">
        <span>Creator</span>
      </a>

      <div class="creator-account">
        <div class="creator-avatar" id="creatorAvatar"></div>
        <div><b>애매모홈</b><small>@mmoh · 부동산·경매</small></div>
      </div>

      <nav class="admin-nav" aria-label="관리자 메뉴">
        <button class="active" data-view="dashboard" onclick="showAdminView('dashboard')"><i>▦</i><span>대시보드</span></button>
        <button data-view="classes" onclick="showAdminView('classes')"><i>&#9654;</i><span>강의 콘텐츠</span></button>
        <button data-view="products" onclick="showAdminView('products')"><i>&#9635;</i><span>클래스 관리</span></button>
        <button data-view="students" onclick="showAdminView('students')"><i>♙</i><span>수강생 관리</span></button>
        <button data-view="sales" onclick="showAdminView('sales')"><i>₩</i><span>매출·정산</span></button>
        <button data-view="settings" onclick="showAdminView('settings')"><i>⚙</i><span>채널 설정</span></button>
      </nav>

      <div class="sidebar-bottom">
        <a href="./index.html#/c/mmoh" target="_blank" rel="noopener" class="creator-page-link">내 페이지 보기 <span>↗</span></a>
        <button onclick="adminToast('로그아웃되었습니다')">로그아웃</button>
      </div>
    </aside>

    <div class="admin-workspace">
      <header class="admin-topbar">
        <div><span class="mobile-admin-title">크리에이터 관리자</span></div>
        <div class="topbar-actions">
          <div class="admin-profile"><b>이원일</b><small>관리자</small></div>
          <div class="profile-dot">이</div>
        </div>
      </header>

      <main class="admin-main" id="adminContent"></main>
    </div>
  </div>


  <div class="class-preview-modal" id="classPreviewModal" onclick="if(event.target===this)closeClassPreview()">
    <div class="class-preview-dialog" role="dialog" aria-modal="true" aria-label="강의 상세 미리보기">
      <div class="class-preview-head"><div><b>클래스 상세 미리보기</b><span>수강생에게 보이는 화면입니다.</span></div><button type="button" onclick="closeClassPreview()" aria-label="미리보기 닫기">×</button></div>
      <iframe id="classPreviewFrame" title="클래스 상세 미리보기"></iframe>
    </div>
  </div>

  <div class="student-detail-modal" id="studentDetailModal"></div>
  <div class="unsaved-changes-modal" id="unsavedChangesModal" aria-hidden="true" onclick="if(event.target===this)closeUnsavedChangesModal()">
    <section class="unsaved-changes-dialog" role="dialog" aria-modal="true" aria-labelledby="unsavedChangesTitle" aria-describedby="unsavedChangesDescription">
      <div class="unsaved-changes-icon" aria-hidden="true">!</div>
      <h2 id="unsavedChangesTitle">저장하지 않고 나가시겠어요?</h2>
      <p id="unsavedChangesDescription">지금 나가면 작성하거나 수정한 내용이 저장되지 않습니다.</p>
      <div class="unsaved-changes-actions">
        <button type="button" class="btn primary" id="unsavedChangesStay" onclick="closeUnsavedChangesModal()">계속 작성하기</button>
        <button type="button" class="btn leave" onclick="confirmUnsavedChangesLeave()">저장하지 않고 나가기</button>
      </div>
    </section>
  </div>
  <div class="unsaved-changes-modal" id="contentDeleteModal" aria-hidden="true" onclick="if(event.target===this)closeContentDeleteModal()">
    <section class="unsaved-changes-dialog" role="dialog" aria-modal="true" aria-labelledby="contentDeleteTitle" aria-describedby="contentDeleteDescription">
      <div class="unsaved-changes-icon" aria-hidden="true">!</div>
      <h2 id="contentDeleteTitle">강의 콘텐츠를 삭제할까요?</h2>
      <p id="contentDeleteDescription"></p>
      <div class="unsaved-changes-actions">
        <button type="button" class="btn" id="contentDeleteCancel" onclick="closeContentDeleteModal()">취소</button>
        <button type="button" class="btn leave" id="contentDeleteConfirm" onclick="confirmLectureContentDelete()">삭제</button>
      </div>
    </section>
  </div>
  <div class="admin-toast" id="adminToast"></div>
  <script src="./js/data.js"></script>
  <script src="./js/refund-policy.js"></script>
  <script src="./js/admin.js"></script>
  <script src="./js/policy-guide.js?v=20260724-2"></script>
</body>
</html>
